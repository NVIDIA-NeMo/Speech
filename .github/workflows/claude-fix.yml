name: Claude Fix Issue

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  acknowledge:
    if: >-
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '/claude fix')
    runs-on: ubuntu-latest
    steps:
      - name: Add eyes reaction to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

  claude-fix:
    needs: acknowledge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            You are a developer working on the NeMo repository.
            Based on the issue description and comments, implement a fix.
            Create a new branch and open a pull request with your changes.
            Include a clear PR description explaining what was fixed and how.
            Make sure to write or update tests if applicable.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
