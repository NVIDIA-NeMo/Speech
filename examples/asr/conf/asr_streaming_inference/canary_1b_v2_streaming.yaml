# ================================
# ASR Streaming Configuration - Canary 1B v2 (AED Multitask Model)
# ================================
# For short chunks (<10s) with left/right context padding.
# Uses streaming inference with AlignAtt or Wait-k policies.
#
# Use with speech_to_text_aed_streaming_infer.py script (NOT chunked).
#
# Example usage:
# python ../asr_chunked_inference/aed/speech_to_text_aed_streaming_infer.py \
#     --config-path=../conf/asr_streaming_inference \
#     --config-name=canary_1b_v2_streaming \
#     dataset_manifest=<path to manifest> \
#     output_filename=<path to output file>
# ================================

# Required configs
model_path: null  # Path to a .nemo file (optional, use pretrained_name instead)
pretrained_name: nvidia/canary-1b-v2  # Name of a pretrained model
audio_dir: null  # Path to a directory which contains audio files
dataset_manifest: null  # Path to dataset's JSON manifest

# General configs
output_filename: null  # if None, output will be stored in the same directory as the input
batch_size: 1  # number of samples to process in parallel
num_workers: 0  # number of workers for data loading
random_seed: null  # seed number for reproducibility

# ================================
# Streaming buffer configs (KEY DIFFERENCE from chunked inference)
# ================================
# These provide overlapping context for better accuracy at chunk boundaries
#
# Recommended settings:
#   - 1.5s latency: left=10.0, chunk=1.0, right=0.5
#   - 2.5s latency: left=10.0, chunk=2.0, right=0.5
#   - Lower latency: left=5.0, chunk=0.5, right=0.25
#
chunk_secs: 2.4  # Actual chunk size to process (can be <10s)
left_context_secs: 10.0  # Left context padding (larger = better quality, no latency impact)
right_context_secs: 2.4  # Right context/lookahead (adds to latency)

# ================================
# Streaming decoding config
# ================================
decoding:
  # Streaming policy: "alignatt" (recommended) or "waitk"
  # - alignatt: Lower latency, predicts tokens based on cross-attention condition
  # - waitk: Higher latency but more stable, predicts one token per chunk
  streaming_policy: waitk
  
  # AlignAtt specific settings
  waitk_lagging: 2  # number of chunks to wait in the beginning (works for waitk and alignatt)
  alignatt_thr: 8  # frames threshold for alignatt
  max_generation_length: 512  # maximum number of tokens per sample

# GPU settings
cuda: null  # Set to int to define CUDA device, null for auto-detection
allow_mps: true  # Allow Apple Silicon MPS device
compute_dtype: null  # "float32", "bfloat16" or "float16"; null = auto
matmul_precision: high  # "highest", "high", or "medium"
audio_type: wav
sort_input_manifest: true

# Transcription settings
overwrite_transcripts: true  # Recompute even if output exists

# Config for word / character error rate calculation
calculate_wer: true
calculate_bleu: false  # for AST task
calculate_latency: true
clean_groundtruth_text: false
ignore_capitalization: true
ignore_punctuation: true
langid: en  # specify this for convert_num_to_words step in groundtruth cleaning
use_cer: false

# Extra arguments for Canary prompt generation
presort_manifest: true
return_hypotheses: false
channel_selector: null
gt_text_attr_name: text
gt_lang_attr_name: source_lang
timestamps: false
prompt: {}

# Debug mode
debug_mode: false
