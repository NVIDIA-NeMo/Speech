# ================================
# ASR Configuration - Conformer Transducer XLarge (Buffered Streaming) - CPU Version
# ================================
# Model: nvidia/stt_en_conformer_transducer_xlarge
# This config uses buffered/chunked streaming inference for ASR evaluation on CPU
# ================================
asr:
  model_name: nvidia/stt_en_conformer_transducer_xlarge  # Pre-trained RNNT model
  device: cpu                                  # Device for inference: 'cuda' or 'cpu'
  device_id: -1                                # CPU mode (negative value)
  compute_dtype: float32                       # Use float32 for CPU
  use_amp: false                               # Disable AMP for CPU
  decoding:
    strategy: "greedy_batch"
    preserve_alignments: false
    fused_batch_size: -1
    greedy:
      use_cuda_graph_decoder: false            # Disable CUDA graph decoder for CPU
      max_symbols: 10


# ========================
# Streaming configuration
# ========================
streaming:
  sample_rate: 16000                          # Audio sample rate in Hz
  batch_size: 1                               # Number of audio frames per batch
  left_padding_size: 5.6                      # Left padding duration in seconds
  right_padding_size: 1.6                     # Right padding duration in seconds
  chunk_size: 0.8                             # Audio chunk size in seconds
  word_boundary_tolerance: 4                  # Tolerance for word boundaries
  request_type: feature_buffer                # Type of request: frame or feature_buffer
  stateful: true                              # Whether to use stateful processing
  padding_mode: right                         # Padding mode: left or right


# ========================
# Endpointing settings
# ========================
endpointing:
  stop_history_eou: 800                       # Time window (ms) for evaluating EoU
  residue_tokens_at_end: 2                    # Number of residual tokens used for EoU


# ========================
# Confidence estimation
# ========================
confidence:
  exclude_blank: true                         # Exclude blank tokens when calculating confidence
  aggregation: mean                           # Aggregation method for confidence across time steps
  method_cfg:
    name: entropy                             # Confidence estimation method: 'max_prob' or 'entropy'
    entropy_type: tsallis                     
    alpha: 0.5                                
    entropy_norm: exp


# ==========================================
# Inverse Text Normalization Configuration
# ==========================================
itn:
  input_case: lower_cased                       # Input text case handling: 'lower_cased', 'cased'
  whitelist: null                               # Custom whitelist for ITN processing
  overwrite_cache: false                        # Whether to overwrite existing cache files
  max_number_of_permutations_per_split: 729     # Maximum permutations allowed per text split during ITN processing
  left_padding_size: 4                          # Padding size (#spans) for ITN context
  batch_size: 32                                # Batch size for ITN inference
  n_jobs: 16                                    # Number of parallel jobs for ITN processing


# ========================
# Pipeline settings
# ========================
matmul_precision: highest                    # Use highest precision for CPU
log_level: 20                                # Logging level: 20 (INFO)
pipeline_type: buffered                      # Pipeline type: buffered (for regular models)
asr_decoding_type: rnnt                      # Decoding method: rnnt (transducer)


# ========================
# Runtime arguments
# ========================
audio_file: null                              # Path to audio file, directory, or manifest JSON
output_filename: null                         # Path to output transcription JSON file
output_dir: null                              # Directory to save time-aligned output
enable_pnc: false                             # No punctuation & capitalization
enable_itn: false                             # No inverse text normalization
enable_nmt: false                             # No translation
asr_output_granularity: segment               # Output granularity: word or segment
cache_dir: null                               # Directory to store cache
lang: null                                    # Language code for ASR model
return_tail_result: false                     # Whether to return tail labels
calculate_wer: true                           # Calculate WER
calculate_bleu: false                         # No BLEU (ASR only)


# ========================
# Metrics for ASR evaluation
# ========================
metrics:
  asr:
    gt_text_attr_name: text                     # Attribute name for ground truth text
    clean_groundtruth_text: false               # Whether to clean ground truth text
    langid: en                                  # Language code for text normalization
    use_cer: false                              # Use WER, not CER
    ignore_capitalization: true                 # Ignore capitalization for WER
    ignore_punctuation: true                    # Ignore punctuation for WER
    strip_punc_space: false                     # Don't strip punctuation and space
