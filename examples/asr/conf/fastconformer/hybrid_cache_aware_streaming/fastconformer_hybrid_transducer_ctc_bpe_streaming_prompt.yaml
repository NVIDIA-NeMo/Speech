# Cache-aware streaming FastConformer-Hybrid-Transducer-CTC ASR model with prompt support
# Combines cache-aware streaming encoder with prompt-based multilingual capability

# You may find more detail:
# FastConformer here: https://docs.nvidia.com/deeplearning/nemo/user-guide/docs/en/stable/asr/models.html#fast-conformer
# Hybrid ASR: https://docs.nvidia.com/deeplearning/nemo/user-guide/docs/en/stable/asr/models.html#hybrid-transducer-ctc
# Cache-aware Conformer here: https://docs.nvidia.com/deeplearning/nemo/user-guide/docs/en/stable/asr/models.html#cache-aware-streaming-conformer

name: "FastConformer-Hybrid-Transducer-CTC-BPE-Prompt-Streaming"

model:
  sample_rate: 16000
  compute_eval_loss: false # eval samples can be very long and exhaust memory. Disable computation of transducer loss during validation/testing with this flag.
  log_prediction: true # enables logging sample predictions in the output during training
  skip_nan_grad: false

  model_defaults:
    enc_hidden: ${model.encoder.d_model}
    pred_hidden: 640
    joint_hidden: 640
    # Prompt configuration
    initialize_prompt_feature: true
    num_prompts: 128
    norm: None
    # Dictionary mapping prompt identifiers to their corresponding embedding indices
    prompt_dictionary: {
    # Language prompts (0-99)
    'en-US': 0,
    'en': 0,
    'en-GB': 1,
    'enGB': 1,
    'es-ES': 2,
    'esES': 2,
    'es-US': 3,
    'es': 3,
    'zh-CN': 4,
    'zh-ZH': 4,
    'zh-TW': 5,
    'hi-IN': 6,
    'hi': 6,
    'hi-HI': 6,
    'ar-AR': 7,
    'ar': 7,
    'fr-FR': 8,
    'fr': 8,
    'de-DE': 9,
    'de': 9,
    'ja-JP': 10,
    'ja-JA': 10,
    'ru-RU': 11,
    'ru': 11,
    'pt-BR': 12,
    'pt-PT': 13,
    'pt': 13,
    'ko-KR': 14,
    'ko': 14,
    'ko-KO': 14,
    'it-IT': 15,
    'it': 15,
    'nl-NL': 16,
    'nl': 16,
    'pl-PL': 17,
    'pl': 17,
    'tr-TR': 18,
    'tr': 18,
    'uk-UA': 19,
    'uk': 19,
    'ro-RO': 20,
    'ro': 20,
    'el-GR': 21,
    'el': 21,
    'cs-CZ': 22,
    'cs': 22,
    'hu-HU': 23,
    'hu': 23,
    'sv-SE': 24,
    'sv': 24,
    'da-DK': 25,
    'da': 25,
    'fi-FI': 26,
    'fi': 26,
    'no-NO': 27,
    'no': 27,
    'nb-NO': 103,
    'nb': 103,
    'sk-SK': 28,
    'sk': 28,
    'hr-HR': 29,
    'hr': 29,
    'bg-BG': 30,
    'bg': 30,
    'lt-LT': 31,
    'lt': 31,
    # Granary languages (60-62)
    'et-EE': 60,
    'et': 60,
    'lv-LV': 61,
    'lv': 61,
    'sl-SI': 62,
    'sl': 62,
    'th-TH': 32,
    'vi-VN': 33,
    'id-ID': 34,
    'ms-MY': 35,
    'bn-IN': 36,
    'ur-PK': 37,
    'fa-IR': 38,
    'ta-IN': 39,
    'te-IN': 40,
    'mr-IN': 41,
    'gu-IN': 42,
    'kn-IN': 43,
    'ml-IN': 44,
    'si-LK': 45,
    'ne-NP': 46,
    'km-KH': 47,
    'sw-KE': 48,
    'am-ET': 49,
    'ha-NG': 50,
    'zu-ZA': 51,
    'yo-NG': 52,
    'ig-NG': 53,
    'af-ZA': 54,
    'rw-RW': 55,
    'so-SO': 56,
    'ny-MW': 57,
    'ln-CD': 58,
    'or-KE': 59,
    'he-IL': 64,
    'ku-TR': 65,
    'az-AZ': 66,
    'ka-GE': 67,
    'hy-AM': 68,
    'uz-UZ': 69,
    'tg-TJ': 70,
    'ky-KG': 71,
    'qu-PE': 80,
    'ay-BO': 81,
    'gn-PY': 82,
    'nah-MX': 83,
    'mi-NZ': 96,
    'haw-US': 97,
    'sm-WS': 98,
    'to-TO': 99,
    'fr-CA': 100,
    'mt-MT': 102,
    'auto': 101
    }

  train_ds:
    manifest_filepath: /config/asr_P0_P1_riva_training_data_v2_fixed_spacing_with_lang_tag.yaml
    sample_rate: ${model.sample_rate}
    use_lhotse: true
    shard_manifests: true
    batch_duration: 400
    quadratic_duration: 15
    num_buckets: 30
    shuffle: true
    num_workers: 8
    pin_memory: true
    max_duration: 39.99 # you may need to update it for your dataset
    min_duration: 0.1
    # tarred datasets
    is_tarred: true
    tarred_audio_filepaths: null
    shuffle_n: 2048
    slice_length: 100
    # bucketing params
    bucketing_strategy: "fully_randomized"
    bucketing_batch_size: null
    bucket_buffer_size: 10000
    shuffle_buffer_size: 10000
    # prompt configs
    prompt_field: target_lang
    prompt_dictionary: ${model.model_defaults.prompt_dictionary}
    num_prompts: ${model.model_defaults.num_prompts}
    subsampling_factor: ${model.encoder.subsampling_factor}
    lang_field: target_lang
    training_mode: true  # 50% use auto (101), 50% use actual lang ID

  validation_ds:
    manifest_filepath: ???
    sample_rate: ${model.sample_rate}
    batch_size: 2
    shuffle: false
    use_start_end_token: false
    num_workers: 2
    pin_memory: true
    batch_duration: null
    use_lhotse: true
    use_bucketing: false
    max_cuts: 8
    # prompt configurations for validation
    prompt_field: target_lang
    prompt_dictionary: ${model.model_defaults.prompt_dictionary}
    num_prompts: ${model.model_defaults.num_prompts}
    subsampling_factor: ${model.encoder.subsampling_factor}
    training_mode: true  # pass lang ID 50% 

  test_ds:
    manifest_filepath: '/manifests/fleurs/fleurs_emea_emea_lhotse.dev.ast_update_lang_id_cross_only_unique_.json'
    sample_rate: ${model.sample_rate}
    batch_size: 16
    shuffle: false
    use_start_end_token: false
    num_workers: 8
    pin_memory: true
    use_lhotse: true
    use_bucketing: false
    # prompt configurations for testing
    prompt_field: target_lang
    prompt_dictionary: ${model.model_defaults.prompt_dictionary}
    num_prompts: ${model.model_defaults.num_prompts}
    subsampling_factor: ${model.encoder.subsampling_factor}
    training_mode: false  # Always use actual lang ID during testing

  # You may find more detail on how to train a tokenizer at: /scripts/tokenizers/process_asr_text_tokenizer.py
  tokenizer:
    dir: ???  # path to directory which contains either tokenizer.model (bpe) or vocab.txt (for wpe)
    type: bpe  # Can be either bpe (SentencePiece tokenizer) or wpe (WordPiece tokenizer)

  preprocessor:
    _target_: nemo.collections.asr.modules.AudioToMelSpectrogramPreprocessor
    sample_rate: ${model.sample_rate}
    normalize: "NA" # No normalization for mel-spectogram makes streaming easier
    window_size: 0.025
    window_stride: 0.01
    window: "hann"
    features: 128
    n_fft: 512
    frame_splicing: 1
    dither: 0.00001
    pad_to: 0

  spec_augment:
    _target_: nemo.collections.asr.modules.SpectrogramAugmentation
    freq_masks: 2 # set to zero to disable it
    time_masks: 10 # set to zero to disable it
    freq_width: 27
    time_width: 0.05

  encoder:
    _target_: nemo.collections.asr.modules.ConformerEncoder
    feat_in: ${model.preprocessor.features}
    feat_out: -1 # you may set it if you need different output size other than the default d_model
    n_layers: 42
    d_model: 1024
    use_bias: false

    # Sub-sampling parameters
    subsampling: dw_striding # vggnet, striding, stacking or stacking_norm, dw_striding
    subsampling_factor: 8 # must be power of 2 for striding and vggnet
    subsampling_conv_channels: 256 # set to -1 to make it equal to the d_model
    causal_downsampling: true  # Required for streaming

    # Reduction parameters: Can be used to add another subsampling layer at a given position.
    reduction: null # pooling, striding, or null
    reduction_position: null # Encoder block index or -1 for subsampling at the end of encoder
    reduction_factor: 1

    # Feed forward module's params
    ff_expansion_factor: 4

    # Multi-headed Attention Module's params
    self_attention_model: rel_pos # rel_pos or abs_pos
    n_heads: 8 # may need to be lower for smaller d_models
    # [left, right] specifies the number of steps to be seen from left and right of each step in self-attention
    # For multi-lookahead models, you may specify a list of context sizes.
    # look-ahead(secs) = att_context_size[1]*subsampling_factor*window_stride, example: 13*8*0.01=1.04s
    att_context_size: [70, 6]  # look-ahead = 6*8*0.01 = 0.48s
    att_context_probs: null
    att_context_style: chunked_limited # regular or chunked_limited
    xscaling: false
    untie_biases: true # unties the biases of the TransformerXL layers
    pos_emb_max_len: 5000

    # Convolution module's params
    conv_kernel_size: 9
    conv_norm_type: 'layer_norm' # batch_norm or layer_norm or groupnormN (N specifies the number of groups)
    # conv_context_size can be"causal" or a list of two integers while conv_context_size[0]+conv_context_size[1]+1==conv_kernel_size
    # null means [(kernel_size-1)//2, (kernel_size-1)//2], and 'causal' means [(kernel_size-1), 0]
    conv_context_size: causal  # Required for streaming

    ### regularization
    dropout: 0.1 # The dropout used in most of the Conformer Modules
    dropout_pre_encoder: 0.1 # The dropout used before the encoder
    dropout_emb: 0.0 # The dropout used for embeddings
    dropout_att: 0.1 # The dropout for multi-headed attention modules

    # set to non-zero to enable stochastic depth
    stochastic_depth_drop_prob: 0.0
    stochastic_depth_mode: linear  # linear or uniform
    stochastic_depth_start_layer: 1

  decoder:
    _target_: nemo.collections.asr.modules.RNNTDecoder
    normalization_mode: null # Currently only null is supported for export.
    random_state_sampling: false # Random state sampling: https://arxiv.org/pdf/1910.11455.pdf
    blank_as_pad: true # This flag must be set in order to support exporting of RNNT models + efficient inference.

    prednet:
      pred_hidden: ${model.model_defaults.pred_hidden}
      pred_rnn_layers: 2
      t_max: null
      dropout: 0.2

  joint:
    _target_: nemo.collections.asr.modules.RNNTJoint
    log_softmax: null  # 'null' would set it automatically according to CPU/GPU device
    preserve_memory: false  # dramatically slows down training, but might preserve some memory

    # Fuses the computation of prediction net + joint net + loss + WER calculation
    # to be run on sub-batches of size `fused_batch_size`.
    fuse_loss_wer: true
    fused_batch_size: 2

    jointnet:
      joint_hidden: ${model.model_defaults.joint_hidden}
      activation: "relu"
      dropout: 0.2

  decoding:
    strategy: "greedy_batch" # can be greedy, greedy_batch, beam, tsd, alsd.

    # greedy strategy config
    greedy:
      max_symbols: 10

    # beam strategy config
    beam:
      beam_size: 2
      return_best_hypothesis: False
      score_norm: true
      tsd_max_sym_exp: 50  # for Time Synchronous Decoding
      alsd_max_target_len: 2.0  # for Alignment-Length Synchronous Decoding

  # The section which would contain the decoder and decoding configs of the auxiliary CTC decoder
  aux_ctc:
    ctc_loss_weight: 0.1 # the weight used to combine the CTC loss with the RNNT loss
    use_cer: false
    ctc_reduction: 'mean_batch'
    decoder:
      _target_: nemo.collections.asr.modules.ConvASRDecoder
      feat_in: null
      num_classes: -1
      vocabulary: []
    decoding:
      strategy: "greedy"

  # config for InterCTC loss: https://arxiv.org/abs/2102.03216
  interctc:
    loss_weights: []
    apply_at_layers: []

  loss:
    loss_name: "default"

    warprnnt_numba_kwargs:
      # FastEmit regularization: https://arxiv.org/abs/2010.11148
      # You may enable FastEmit to reduce the latency of the model for streaming
      fastemit_lambda: 5e-3  # Recommended values to be in range [1e-4, 1e-2], 0.001 is a good start.
      clamp: -1.0  # if > 0, applies gradient clamping in range [-clamp, clamp] for the joint tensor only.

  # Adds Gaussian noise to the gradients of the decoder to avoid overfitting
  variational_noise:
    start_step: 0
    std: 0.0

  optim:
    name: adamw
    lr: 2.0
    # optimizer arguments
    betas: [0.9, 0.98]
    weight_decay: 1e-3

    # scheduler setup
    sched:
      name: NoamAnnealing
      d_model: ${model.encoder.d_model}
      # scheduler config override
      warmup_steps: 10000
      warmup_ratio: null
      min_lr: 1e-6

trainer:
  devices: -1 # number of GPUs, -1 would use all available GPUs
  num_nodes: 1
  max_epochs: -1
  max_steps: 500000 # computed at runtime if not set
  val_check_interval: 0.5 # Set to 0.25 to check 4 times per epoch, or an int for number of iterations
  accelerator: auto
  strategy:
    _target_: lightning.pytorch.strategies.DDPStrategy
    gradient_as_bucket_view: true
  accumulate_grad_batches: 1
  gradient_clip_val: 0.5
  precision: bf16 # Should be set to 16 for O1 and O2 to enable the AMP.
  log_every_n_steps: 100  # Interval of logging.
  enable_progress_bar: True
  num_sanity_val_steps: 0 # number of steps to perform validation steps for sanity check the validation process before starting the training, setting to 0 disables it
  sync_batchnorm: true
  enable_checkpointing: False  # Provided by exp_manager
  logger: false  # Provided by exp_manager
  benchmark: false # needs to be false for models with variable-length speech input as it slows down training
  use_distributed_sampler: false
  limit_train_batches: 1000


exp_manager:
  exp_dir: null
  name: ${name}
  create_tensorboard_logger: true
  create_checkpoint_callback: true
  checkpoint_callback_params:
    # in case of multiple validation sets, first one is used
    monitor: "val_wer"
    mode: "min"
    save_top_k: 5
    always_save_nemo: True # saves the checkpoints as nemo files instead of PTL checkpoints
  resume_if_exists: false
  resume_ignore_no_checkpoint: false

  create_wandb_logger: false
  wandb_logger_kwargs:
    name: null
    project: null
