# StreamingSALM Context Biasing Ablation: prob=0.0
# No context biasing during training
# Hardware: 2x RTX 6000 Ada (48GB each)

model:
  pretrained_llm: Qwen/Qwen3-1.7B
  pretrained_mimi: kyutai/mimi
  pretrained_forced_aligner: Qwen/Qwen3-ForcedAligner-0.6B
  forced_aligner_language: English

  pretrained_weights: true

  blank_token: "<blank>"
  num_codebooks: 8

  # Latency
  min_latency: 1
  max_latency: 10

  # Context biasing — ABLATION: disabled
  context_biasing_prob: 0.0

  # Streaming cache
  cache_sink_size: 64
  cache_window_size: 2048

  # Full LLM fine-tuning: only freeze Mimi and forced aligner
  freeze_params:
    - "^mimi\\..+$"
    - "^forced_aligner\\..+$"
  prevent_freeze_params: []

  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-4
    betas: [0.9, 0.98]
    weight_decay: 1e-3
    foreach: true

  lr_scheduler:
    _target_: nemo.core.optim.lr_scheduler.CosineAnnealing
    warmup_steps: 1000
    min_lr: 1e-6
    max_steps: ${trainer.max_steps}

trainer:
  devices: 2
  accelerator: gpu
  num_nodes: 1
  precision: bf16-true
  logger: false
  enable_checkpointing: false
  use_distributed_sampler: false
  max_steps: 100000
  limit_train_batches: 5000
  val_check_interval: ${trainer.limit_train_batches}
  limit_val_batches: 10
  log_every_n_steps: 10
  num_sanity_val_steps: 1
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  strategy:
    _target_: lightning.pytorch.strategies.DDPStrategy
    gradient_as_bucket_view: true
    find_unused_parameters: true

data:
  train_ds:
    sample_rate: 24000
    pretokenize: false
    input_cfg:
      - type: lhotse
        cuts_path: /data/librispeech/lhotse/librispeech_cuts_lower_train-960h.jsonl.gz
    seed: 42
    shuffle: true
    shard_seed: "randomized"
    num_workers: 4
    batch_size: null
    use_bucketing: true
    bucket_duration_bins: [8.895, 11.82, 13.055, 14.745, 15.14, 15.905, 27.92]
    bucket_batch_size: [38, 30, 28, 26, 24, 22, 13]

  validation_ds:
    sample_rate: 24000
    pretokenize: false
    datasets:
      val_set_0:
        input_cfg:
          - type: lhotse
            cuts_path: /data/librispeech/lhotse/librispeech_cuts_lower_dev-clean.jsonl.gz
    batch_size: 1
    seed: 42
    shard_seed: "randomized"

exp_manager:
  exp_dir: null
  explicit_log_dir: results/cb_0.0/
  name: streaming_salm_cb_0.0
  create_tensorboard_logger: false
  create_checkpoint_callback: true
  use_datetime_version: true
  max_time_per_run: null
  resume_from_checkpoint: null
  resume_if_exists: true
  resume_ignore_no_checkpoint: true
  create_wandb_logger: false
  wandb_logger_kwargs:
    name: cb_0.0
    project: streaming_salm
    resume: true
  checkpoint_callback_params:
    filename: "{step}"
    monitor: val_loss
    mode: min
    every_n_train_steps: null
    every_n_epochs: 1
    save_top_k: 1
