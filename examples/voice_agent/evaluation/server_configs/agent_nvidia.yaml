# This is an example config for setting up a NeMo Voice Agent server.
# Please refer to https://github.com/NVIDIA-NeMo/NeMo/tree/main/examples/voice_agent/README.md for more details
# STT, LLM and TTS models have standalone configs in the folder "server/server_configs/{stt,llm,tts}_configs".
# Specify the type and an a model identifier to automatically configure the model.

server:
  log_file: "bot_agent_server_nvidia.log"
  log_level: "DEBUG"
  create_new_log: true
  overwrite_existing_log: true
  use_model_registry: false
  talk_first: false  

transport:
  audio_out_10ms_chunks: 10
  record_audio_data: false
  audio_log_dir: "./audio_logs_agent"

vad:
  type: silero
  confidence: 0.6  # VAD threshold for detecting speech versus non-speech
  start_secs: 0.1  # min amount of speech to trigger UserStartSpeaking
  stop_secs: 1.2  # min amount of silence to trigger UserStopSpeaking
  min_volume: 0.2  # Microphone volumn threshold for VAD

stt:
  type: nemo # choices in ['nemo'] currently only NeMo is supported
  model: "nvidia/parakeet_realtime_eou_120m-v1"
  device: "cuda"
  att_context_size: [70,1] # left and right attention context sizes for streaming ASR
  frame_len_in_secs: 0.08  # default for FastConformer, do not change unless using other architechtures

diar:
  type: nemo
  enabled: false # set to false to disable
  model: "nvidia/diar_streaming_sortformer_4spk-v2.1"
  device: "cuda"
  threshold: 0.4  # threshold value used to determine if a speaker exists or not, setting it to a lower value will increaset the sensitivity of the model
  frame_len_in_secs: 0.08  # default for Sortformer, do not change unless using other architechtures

turn_taking:
  backchannel_phrases_path: 
    - "wow"
    - "uhuh"
  max_buffer_size: 2  # num of words more than this amount will interrupt the LLM immediately if not backchannel phrases
  bot_stop_delay: 0.0  # a delay in seconds allowed between server and client audio output, so that the BotStopSpeaking signal is handled not too far away from the actual time that the user hears all audio output

llm:
  type: nvidia
  model: "nvidia/nvidia/Nemotron-3-Nano-30B-A3B"
  system_prompt: "You are a helpful AI agent named Lisa. Start by greeting the user with 'Hi, I'm Lisa, your helpful AI assistant. How can I help you today?'."

  system_role: "system"  # role for system prompt, set it to `user` for models that do not support system prompt
  system_prompt_suffix: "Keep your responses concise and conversational since they will be spoken aloud. Avoid special characters. Use only simple, plain text sentences. Always punctuate your responses using standard sentence punctuation: commas, periods, question marks, exclamation points, etc. Always spell out numbers as words. Before responding to the user, check if the user request requires using external tools, and use the tools if they match with the user's intention. Otherwise, use your internal knowledge to answer the user's question. Do not use tools for casual conversation or when the tools don't fit the use cases. You should still try to address the user's request when it's not related to the provided tools. If you are provided with a set of tools, use them only when needed, do not limit your capabilities to the scope of the tools. If the purpose of a tool matches well with a user's request, always try to call the tool first. Conversation history should not limit your behavior on whether you can use tools. You must answer questions not related to the tools. Avoid any emoji in your response. After you have addressed all the user's request, use the `SendScenarioSummaryTool` to send your final response in the requested FINAL_RESPONSE_FORMAT. If FINAL_RESPONSE_FORMAT is not specified, send the whole conversation context history as it is. /no_think"
  enable_tool_calling: true  # set to True since the vllm config below supports tool calling

  ##############################
  #### Generation config #######
  ##############################
  api_key: null # set NVIDIA_API_KEY in env
  base_url: "https://inference-api.nvidia.com/v1"  
  # `params` are the inference parameters that would be passed into OpenAI API, 
  # please put additional model-specific parameters in `extra`
  nvidia_generation_params:
    frequency_penalty: 0.0  # Penalty for frequent tokens (-2.0 to 2.0).
    presence_penalty: 0.0  # Penalty for new tokens (-2.0 to 2.0).
    seed: 42  # Random seed for deterministic outputs.
    temperature: 0.6  # Sampling temperature (0.0 to 2.0).
    top_k: null  # Top-k sampling parameter (currently ignored by OpenAI).
    top_p: 0.95  # Top-p (nucleus) sampling parameter (0.0 to 1.0).
    max_completion_tokens: 256  # max number of tokens to generate
    extra:  # additional model specific params can be specified in dict format
      extra_body:
        chat_template_kwargs:
          enable_thinking: False  # disable thinking



tts:
  type: nemo
  model: "kokoro"
  device: "cuda"
  main_model_id: "hexgrad/Kokoro-82M"
  sub_model_id: "af_heart" # "af_heart" "af_bella" "am_fenrir" "am_michael"
  speed: 1.25 # Speaking rate
  extra_separator:  # a list of additional punctuations to chunk LLM response into segments for faster TTS output, e.g., ",". Set to `null` to use default behavior 
    - ','
    - '\n'
    - "."
    - "?"
    - "!"
    - ";"
  think_tokens: ["<think>", "</think>"]  # specify them to avoid TTS for thinking process, set to `null` to allow thinking out loud
  ignore_strings:  # strings/characters to ignore in TTS
    - "*"
    - "<unk>"
